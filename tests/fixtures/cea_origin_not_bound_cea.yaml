schema_version: "2.0"
# R2-P0-4 exploit: two assessments over same-outlet artifacts laundered as independent origins.
claim_evidence_assessments:
  # B1: the reviewed artifact (evd-same-a, owned by src-same-outlet) is NOT bound into its own
  # origin_chain — the analyst declares a fake independent origin (src-declared-a) with no artifact.
  - id: cea-same-a
    claim_id: clm-echo
    artifact_id: evd-same-a
    support_locator: {kind: PAGE_AND_QUOTE, page: 1, quote: q}
    support_summary: s
    stance: SUPPORTS
    information_credibility: 2
    temporal_scope: {kind: TIMELESS, start: null, end: null}
    origin_chain:
      - {source_id: src-declared-a}
    independence_group: ind-a
    semantic_review: {status: UNCHECKED}
    supersedes: null
  # B2: a link names an artifact (evd-same-a) but misattributes it to src-declared-a, which does not
  # own it (it belongs to src-same-outlet). The reviewed artifact evd-same-b IS bound (link 0), so
  # B1 passes here and B2 fires in isolation.
  - id: cea-mis
    claim_id: clm-echo
    artifact_id: evd-same-b
    support_locator: {kind: PAGE_AND_QUOTE, page: 1, quote: q}
    support_summary: s
    stance: SUPPORTS
    information_credibility: 2
    temporal_scope: {kind: TIMELESS, start: null, end: null}
    origin_chain:
      - {source_id: src-same-outlet, artifact_id: evd-same-b}
      - {source_id: src-declared-a, artifact_id: evd-same-a}
    independence_group: ind-b
    semantic_review: {status: UNCHECKED}
    supersedes: null
