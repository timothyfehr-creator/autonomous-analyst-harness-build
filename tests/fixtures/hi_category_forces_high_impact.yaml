schema_version: "2.0"
# FR-2: a reviewer-assigned impact_category (CASUALTIES) is an AUTHORITATIVE high-impact signal — it
# forces high_impact true even with no trigger word in topics/text. Stored high_impact: false here
# must be raised by the T0 category leg (the durable fix: not dependent on word-list completeness).
claims:
  - id: clm-catforce
    text: x
    epistemic_type: FACT
    support_status: SUPPORTED
    dispute_status: UNCONTESTED
    freshness_status: CURRENT
    lifecycle: REVIEWED
    stability: DURABLE
    topics: [transport]
    high_impact: false
    impact_category: CASUALTIES
    created_at: "2026-06-22T00:00:00Z"
    supersedes: null
    temporal: {kind: AS_OF, event_time: null, as_of: "2026-06-22T00:00:00Z"}
    review_by: "2026-12-22T00:00:00Z"
